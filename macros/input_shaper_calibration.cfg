################################################################################
# INPUT SHAPER CALIBRATION MACRO
#
# Systematic resonance testing for Klipper input shaping with external
# accelerometer (ESP32 + MPU-6050/MPU-6500)
#
# INSTALLATION:
# 1. Copy this file to your Klipper config directory
# 2. Add to printer.cfg: [include input_shaper_calibration.cfg]
# 3. Restart Klipper firmware
#
# USAGE:
# 1. Mount accelerometer on toolhead (for X-axis test) or bed (for Y-axis test)
# 2. Start data capture script:
#    sudo python3 resonance_analyzer.py --port /dev/ttyACM0 --duration 90 --save test.csv
# 3. Within 5 seconds, run macro: INPUT_SHAPER_TEST_X or INPUT_SHAPER_TEST_Y
# 4. Wait for test to complete (~60 seconds)
# 5. Analyze results: python3 resonance_analyzer.py --load test.csv --plot
#
# CONFIGURATION:
# - Adjust temperatures in [gcode_macro _IS_SETTINGS] if needed
# - X-axis tests at 3 Z-heights: Z20, Z150, Z270 (sensor on toolhead)
# - Y-axis tests at 3 Z-heights: Z100, Z200, Z300 (higher for bed sensor clearance)
# - Heats bed and hotend to print temps for accurate results
#
# GitHub: https://github.com/sciovix/T300_Tweaks
# Based on: Klipper input shaping documentation
################################################################################

[gcode_macro _IS_SETTINGS]
description: Input shaper test settings (modify these for your printer)
variable_bed_temp: 60              # Bed temperature for testing (PLA default)
variable_hotend_temp: 200          # Hotend temperature for testing (PLA default)

# X-axis test Z-heights (sensor on toolhead - can go low)
variable_z_low: 20                 # Low Z test height (safe clearance)
variable_z_mid: 150                # Mid Z test height
variable_z_high: 270               # High Z test height (adjust for your max Z)

# Y-axis test Z-heights (sensor on bed - need extra clearance for toolhead)
variable_z_low_y: 100              # Low Z for Y-axis (clearance for bed sensor)
variable_z_mid_y: 200              # Mid Z for Y-axis
variable_z_high_y: 300             # High Z for Y-axis (adjust for your max Z)

variable_slow_speed: 4800          # F4800 = 80 mm/s - Slow precise work
variable_perimeter_speed: 9000     # F9000 = 150 mm/s - Outer wall speed
variable_inner_perimeter_speed: 15000  # F15000 = 250 mm/s - Inner wall speed
variable_medium_fast_speed: 21000  # F21000 = 350 mm/s - Medium-fast movements
variable_infill_speed: 27000       # F27000 = 450 mm/s - Infill speed
variable_small_feature_speed: 30000 # F30000 = 500 mm/s - Rapid direction changes
variable_travel_speed: 36000       # F36000 = 600 mm/s - Travel moves (MAX SPEED)
gcode:
    # This macro just stores variables, no gcode needed


[gcode_macro INPUT_SHAPER_TEST_X]
description: X-axis resonance test (mount sensor on TOOLHEAD)
gcode:
    {% set cfg = printer['gcode_macro _IS_SETTINGS'] %}
    {% set x_min = printer.toolhead.axis_minimum.x + 50 %}
    {% set x_max = printer.toolhead.axis_maximum.x - 50 %}
    {% set x_center = (printer.toolhead.axis_maximum.x / 2)|float %}
    {% set y_center = (printer.toolhead.axis_maximum.y / 2)|float %}

    {action_respond_info("==========================================")}
    {action_respond_info("INPUT SHAPER X-AXIS CALIBRATION")}
    {action_respond_info("Mount sensor on TOOLHEAD")}
    {action_respond_info("==========================================")}

    # Safety checks
    {% if printer.toolhead.homed_axes != "xyz" %}
        {action_respond_info("Homing printer...")}
        G28
    {% endif %}

    # Move to safe position
    G90
    G1 X{x_center} Y{y_center} Z50 F3000

    # Heat to print temps
    {action_respond_info("Heating bed to %dC..." % cfg.bed_temp)}
    M140 S{cfg.bed_temp}
    {action_respond_info("Heating hotend to %dC..." % cfg.hotend_temp)}
    M104 S{cfg.hotend_temp}
    M190 S{cfg.bed_temp}    # Wait for bed
    M109 S{cfg.hotend_temp}  # Wait for hotend

    {action_respond_info("Thermal stabilization (60 seconds)...")}
    G4 P60000

    {action_respond_info("==========================================")}
    {action_respond_info("START CAPTURE SCRIPT NOW!")}
    {action_respond_info("You have 5 seconds...")}
    {action_respond_info("==========================================")}
    M117 START CAPTURE NOW!
    G4 P5000

    # ===== LOW Z TEST (Z20) =====
    {action_respond_info("Test 1/3: LOW Z (%dmm)" % cfg.z_low)}
    M117 LOW Z - SLOW MOVEMENTS
    G1 Z{cfg.z_low} F3000
    G4 P1000
    {% set y_min = printer.toolhead.axis_minimum.y + 50 %}
    {% set y_max = printer.toolhead.axis_maximum.y - 50 %}

    # 1. SLOW precise movements (80 mm/s) - excite low-frequency resonances
    {% for i in range(10) %}
        G1 X{x_min} Y{y_min} F{cfg.slow_speed}
        G1 X{x_max} Y{y_min} F{cfg.slow_speed}
        G1 X{x_max} Y{y_max} F{cfg.slow_speed}
        G1 X{x_min} Y{y_max} F{cfg.slow_speed}
        G1 X{x_min} Y{y_min} F{cfg.slow_speed}
    {% endfor %}

    # 2. Square perimeters (150 mm/s) - outer wall speed, 90 deg corners
    {% for i in range(5) %}
        G1 X{x_min} Y{y_min} F{cfg.perimeter_speed}
        G1 X{x_max} Y{y_min} F{cfg.perimeter_speed}
        G1 X{x_max} Y{y_max} F{cfg.perimeter_speed}
        G1 X{x_min} Y{y_max} F{cfg.perimeter_speed}
        G1 X{x_min} Y{y_min} F{cfg.perimeter_speed}
    {% endfor %}

    # 2. Circular arcs (inner perimeter speed) - smooth curves like rounded features
    M117 LOW Z - CURVES
    {% set radius = 40 %}
    {% for i in range(5) %}
        G1 X{x_center + radius} Y{y_center} F{cfg.inner_perimeter_speed}
        G3 X{x_center} Y{y_center + radius} I{-radius} J0 F{cfg.inner_perimeter_speed}
        G3 X{x_center - radius} Y{y_center} I0 J{-radius} F{cfg.inner_perimeter_speed}
        G3 X{x_center} Y{y_center - radius} I{radius} J0 F{cfg.inner_perimeter_speed}
        G3 X{x_center + radius} Y{y_center} I0 J{radius} F{cfg.inner_perimeter_speed}
    {% endfor %}

    # Medium-fast zigzag (350 mm/s) - transitional speed testing
    M117 LOW Z - MEDIUM-FAST
    {% for i in range(15) %}
        G1 X{x_min} Y{y_min} F{cfg.medium_fast_speed}
        G1 X{x_max} Y{y_max} F{cfg.medium_fast_speed}
    {% endfor %}

    # 45 deg infill lines (450 mm/s) - aggressive diagonal infill
    M117 LOW Z - INFILL
    {% for i in range(25) %}
        G1 X{x_min} Y{y_min} F{cfg.infill_speed}
        G1 X{x_max} Y{y_max} F{cfg.infill_speed}
        G1 X{x_min} Y{y_max} F{cfg.infill_speed}
        G1 X{x_max} Y{y_min} F{cfg.infill_speed}
    {% endfor %}

    # 4. Cross-hatch pattern (infill speed) - aggressive rectilinear infill
    {% for i in range(20) %}
        G1 X{x_min} Y{y_center} F{cfg.infill_speed}
        G1 X{x_max} Y{y_center} F{cfg.infill_speed}
    {% endfor %}
    {% for i in range(20) %}
        G1 X{x_center} Y{y_min} F{cfg.infill_speed}
        G1 X{x_center} Y{y_max} F{cfg.infill_speed}
    {% endfor %}

    # 5. Small detail work (HIGH SPEED) - rapid direction changes for maximum stress
    M117 LOW Z - DETAILS
    {% set detail_size = 10 %}
    {% for i in range(50) %}
        G1 X{x_center - detail_size} Y{y_center} F{cfg.small_feature_speed}
        G1 X{x_center + detail_size} Y{y_center} F{cfg.small_feature_speed}
        G1 X{x_center} Y{y_center - detail_size} F{cfg.small_feature_speed}
        G1 X{x_center} Y{y_center + detail_size} F{cfg.small_feature_speed}
    {% endfor %}

    # 6. Speed transitions (outer→inner→infill) - aggressive speed changes
    M117 LOW Z - SPEED TRANSITIONS
    {% for i in range(8) %}
        G1 X{x_min} Y{y_min} F{cfg.perimeter_speed}  # Outer wall
        G1 X{x_max} Y{y_min} F{cfg.perimeter_speed}
        G1 X{x_max} Y{y_max} F{cfg.inner_perimeter_speed}  # Inner wall
        G1 X{x_min} Y{y_max} F{cfg.inner_perimeter_speed}
        G1 X{x_max} Y{y_center} F{cfg.infill_speed}  # Infill
        G1 X{x_min} Y{y_center} F{cfg.infill_speed}
    {% endfor %}

    # 7. Travel moves (MAX SPEED) - aggressive diagonal movements
    M117 LOW Z - TRAVELS
    {% for i in range(15) %}
        G1 X{x_min} Y{y_min} F{cfg.travel_speed}
        G1 X{x_max} Y{y_max} F{cfg.travel_speed}
        G1 X{x_min} Y{y_max} F{cfg.travel_speed}
        G1 X{x_max} Y{y_min} F{cfg.travel_speed}
    {% endfor %}
    G1 X{x_center} Y{y_center} F3000

    # ===== MID Z TEST (Z150) =====
    {action_respond_info("Test 2/3: MID Z (%dmm)" % cfg.z_mid)}
    M117 MID Z - PERIMETERS
    G1 X{x_center} Z{cfg.z_mid} F3000
    G4 P2000

    # Repeat the same realistic print patterns at mid height
    {% for i in range(5) %}
        G1 X{x_min} Y{y_min} F{cfg.perimeter_speed}
        G1 X{x_max} Y{y_min} F{cfg.perimeter_speed}
        G1 X{x_max} Y{y_max} F{cfg.perimeter_speed}
        G1 X{x_min} Y{y_max} F{cfg.perimeter_speed}
        G1 X{x_min} Y{y_min} F{cfg.perimeter_speed}
    {% endfor %}

    M117 MID Z - CURVES
    {% for i in range(5) %}
        G1 X{x_center + radius} Y{y_center} F{cfg.inner_perimeter_speed}
        G3 X{x_center} Y{y_center + radius} I{-radius} J0 F{cfg.inner_perimeter_speed}
        G3 X{x_center - radius} Y{y_center} I0 J{-radius} F{cfg.inner_perimeter_speed}
        G3 X{x_center} Y{y_center - radius} I{radius} J0 F{cfg.inner_perimeter_speed}
        G3 X{x_center + radius} Y{y_center} I0 J{radius} F{cfg.inner_perimeter_speed}
    {% endfor %}

    M117 MID Z - INFILL
    {% for i in range(15) %}
        G1 X{x_min} Y{y_min} F{cfg.infill_speed}
        G1 X{x_max} Y{y_max} F{cfg.infill_speed}
        G1 X{x_min} Y{y_max} F{cfg.infill_speed}
        G1 X{x_max} Y{y_min} F{cfg.infill_speed}
    {% endfor %}

    {% for i in range(10) %}
        G1 X{x_min} Y{y_center} F{cfg.infill_speed}
        G1 X{x_max} Y{y_center} F{cfg.infill_speed}
    {% endfor %}
    {% for i in range(10) %}
        G1 X{x_center} Y{y_min} F{cfg.infill_speed}
        G1 X{x_center} Y{y_max} F{cfg.infill_speed}
    {% endfor %}

    M117 MID Z - DETAILS
    {% for i in range(20) %}
        G1 X{x_center - detail_size} Y{y_center} F{cfg.small_feature_speed}
        G1 X{x_center + detail_size} Y{y_center} F{cfg.small_feature_speed}
        G1 X{x_center} Y{y_center - detail_size} F{cfg.small_feature_speed}
        G1 X{x_center} Y{y_center + detail_size} F{cfg.small_feature_speed}
    {% endfor %}

    M117 MID Z - TRANSITIONS
    {% for i in range(3) %}
        G1 X{x_min} Y{y_min} F{cfg.perimeter_speed}
        G1 X{x_max} Y{y_min} F{cfg.perimeter_speed}
        G1 X{x_max} Y{y_max} F{cfg.inner_perimeter_speed}
        G1 X{x_min} Y{y_max} F{cfg.inner_perimeter_speed}
        G1 X{x_max} Y{y_center} F{cfg.infill_speed}
        G1 X{x_min} Y{y_center} F{cfg.infill_speed}
    {% endfor %}

    M117 MID Z - TRAVELS
    {% for i in range(8) %}
        G1 X{x_min} Y{y_min} F{cfg.travel_speed}
        G1 X{x_max} Y{y_max} F{cfg.travel_speed}
        G1 X{x_min} Y{y_max} F{cfg.travel_speed}
        G1 X{x_max} Y{y_min} F{cfg.travel_speed}
    {% endfor %}
    G1 X{x_center} Y{y_center} F3000

    # ===== HIGH Z TEST (Z270) =====
    {action_respond_info("Test 3/3: HIGH Z (%dmm)" % cfg.z_high)}
    M117 HIGH Z - PERIMETERS
    G1 X{x_center} Z{cfg.z_high} F3000
    G4 P2000

    # Same realistic print patterns at high Z (tests cantilever effects)
    {% for i in range(5) %}
        G1 X{x_min} Y{y_min} F{cfg.perimeter_speed}
        G1 X{x_max} Y{y_min} F{cfg.perimeter_speed}
        G1 X{x_max} Y{y_max} F{cfg.perimeter_speed}
        G1 X{x_min} Y{y_max} F{cfg.perimeter_speed}
        G1 X{x_min} Y{y_min} F{cfg.perimeter_speed}
    {% endfor %}

    M117 HIGH Z - CURVES
    {% for i in range(5) %}
        G1 X{x_center + radius} Y{y_center} F{cfg.inner_perimeter_speed}
        G3 X{x_center} Y{y_center + radius} I{-radius} J0 F{cfg.inner_perimeter_speed}
        G3 X{x_center - radius} Y{y_center} I0 J{-radius} F{cfg.inner_perimeter_speed}
        G3 X{x_center} Y{y_center - radius} I{radius} J0 F{cfg.inner_perimeter_speed}
        G3 X{x_center + radius} Y{y_center} I0 J{radius} F{cfg.inner_perimeter_speed}
    {% endfor %}

    M117 HIGH Z - INFILL
    {% for i in range(15) %}
        G1 X{x_min} Y{y_min} F{cfg.infill_speed}
        G1 X{x_max} Y{y_max} F{cfg.infill_speed}
        G1 X{x_min} Y{y_max} F{cfg.infill_speed}
        G1 X{x_max} Y{y_min} F{cfg.infill_speed}
    {% endfor %}

    {% for i in range(10) %}
        G1 X{x_min} Y{y_center} F{cfg.infill_speed}
        G1 X{x_max} Y{y_center} F{cfg.infill_speed}
    {% endfor %}
    {% for i in range(10) %}
        G1 X{x_center} Y{y_min} F{cfg.infill_speed}
        G1 X{x_center} Y{y_max} F{cfg.infill_speed}
    {% endfor %}

    M117 HIGH Z - DETAILS
    {% for i in range(20) %}
        G1 X{x_center - detail_size} Y{y_center} F{cfg.small_feature_speed}
        G1 X{x_center + detail_size} Y{y_center} F{cfg.small_feature_speed}
        G1 X{x_center} Y{y_center - detail_size} F{cfg.small_feature_speed}
        G1 X{x_center} Y{y_center + detail_size} F{cfg.small_feature_speed}
    {% endfor %}

    M117 HIGH Z - TRANSITIONS
    {% for i in range(3) %}
        G1 X{x_min} Y{y_min} F{cfg.perimeter_speed}
        G1 X{x_max} Y{y_min} F{cfg.perimeter_speed}
        G1 X{x_max} Y{y_max} F{cfg.inner_perimeter_speed}
        G1 X{x_min} Y{y_max} F{cfg.inner_perimeter_speed}
        G1 X{x_max} Y{y_center} F{cfg.infill_speed}
        G1 X{x_min} Y{y_center} F{cfg.infill_speed}
    {% endfor %}

    M117 HIGH Z - TRAVELS
    {% for i in range(8) %}
        G1 X{x_min} Y{y_min} F{cfg.travel_speed}
        G1 X{x_max} Y{y_max} F{cfg.travel_speed}
        G1 X{x_min} Y{y_max} F{cfg.travel_speed}
        G1 X{x_max} Y{y_min} F{cfg.travel_speed}
    {% endfor %}

    # Return to center and settle
    {action_respond_info("Test complete - settling...")}
    M117 SETTLING
    G1 X{x_center} Y{y_center} F3000
    G4 P3000

    {action_respond_info("==========================================")}
    {action_respond_info("X-AXIS TEST COMPLETE!")}
    {action_respond_info("Analyze data and look at X-axis frequencies")}
    {action_respond_info("==========================================")}
    M117 X-AXIS DONE!


[gcode_macro INPUT_SHAPER_TEST_Y]
description: Y-axis resonance test (mount sensor on BED CENTER)
gcode:
    {% set cfg = printer['gcode_macro _IS_SETTINGS'] %}
    {% set y_min = printer.toolhead.axis_minimum.y + 50 %}
    {% set y_max = printer.toolhead.axis_maximum.y - 50 %}
    {% set x_center = (printer.toolhead.axis_maximum.x / 2)|float %}
    {% set y_center = (printer.toolhead.axis_maximum.y / 2)|float %}

    {action_respond_info("==========================================")}
    {action_respond_info("INPUT SHAPER Y-AXIS CALIBRATION")}
    {action_respond_info("Mount sensor on BED CENTER")}
    {action_respond_info("==========================================")}

    {% if printer.toolhead.homed_axes != "xyz" %}
        {action_respond_info("Homing printer...")}
        G28
    {% endif %}

    G90
    G1 X{x_center} Y{y_center} Z{cfg.z_mid_y} F3000

    {action_respond_info("Heating bed to %dC..." % cfg.bed_temp)}
    M140 S{cfg.bed_temp}
    {action_respond_info("Heating hotend to %dC..." % cfg.hotend_temp)}
    M104 S{cfg.hotend_temp}
    M190 S{cfg.bed_temp}
    M109 S{cfg.hotend_temp}

    {action_respond_info("Thermal stabilization (60 seconds)...")}
    G4 P60000

    {action_respond_info("==========================================")}
    {action_respond_info("START CAPTURE SCRIPT NOW!")}
    {action_respond_info("You have 5 seconds...")}
    {action_respond_info("==========================================")}
    M117 START CAPTURE NOW!
    G4 P5000

    # ===== LOW Z TEST (Z100 - clearance for bed sensor) =====
    {action_respond_info("Test 1/3: LOW Z (%dmm)" % cfg.z_low_y)}
    M117 LOW Z - SLOW MOVEMENTS
    G1 Z{cfg.z_low_y} F3000
    G4 P1000
    {% set x_min = printer.toolhead.axis_minimum.x + 50 %}
    {% set x_max = printer.toolhead.axis_maximum.x - 50 %}

    # 1. SLOW precise movements (80 mm/s) - excite low-frequency resonances
    {% for i in range(10) %}
        G1 X{x_min} Y{y_min} F{cfg.slow_speed}
        G1 X{x_max} Y{y_min} F{cfg.slow_speed}
        G1 X{x_max} Y{y_max} F{cfg.slow_speed}
        G1 X{x_min} Y{y_max} F{cfg.slow_speed}
        G1 X{x_min} Y{y_min} F{cfg.slow_speed}
    {% endfor %}

    # 2. Square perimeters (150 mm/s) - outer wall speed, 90 deg corners
    {% for i in range(5) %}
        G1 X{x_min} Y{y_min} F{cfg.perimeter_speed}
        G1 X{x_max} Y{y_min} F{cfg.perimeter_speed}
        G1 X{x_max} Y{y_max} F{cfg.perimeter_speed}
        G1 X{x_min} Y{y_max} F{cfg.perimeter_speed}
        G1 X{x_min} Y{y_min} F{cfg.perimeter_speed}
    {% endfor %}

    # 2. Circular arcs (inner perimeter speed) - smooth curves like rounded features
    M117 LOW Z - CURVES
    {% set radius = 40 %}
    {% for i in range(5) %}
        G1 X{x_center + radius} Y{y_center} F{cfg.inner_perimeter_speed}
        G3 X{x_center} Y{y_center + radius} I{-radius} J0 F{cfg.inner_perimeter_speed}
        G3 X{x_center - radius} Y{y_center} I0 J{-radius} F{cfg.inner_perimeter_speed}
        G3 X{x_center} Y{y_center - radius} I{radius} J0 F{cfg.inner_perimeter_speed}
        G3 X{x_center + radius} Y{y_center} I0 J{radius} F{cfg.inner_perimeter_speed}
    {% endfor %}

    # Medium-fast zigzag (350 mm/s) - transitional speed testing
    M117 LOW Z - MEDIUM-FAST
    {% for i in range(15) %}
        G1 X{x_min} Y{y_min} F{cfg.medium_fast_speed}
        G1 X{x_max} Y{y_max} F{cfg.medium_fast_speed}
    {% endfor %}

    # 45 deg infill lines (450 mm/s) - aggressive diagonal infill
    M117 LOW Z - INFILL
    {% for i in range(25) %}
        G1 X{x_min} Y{y_min} F{cfg.infill_speed}
        G1 X{x_max} Y{y_max} F{cfg.infill_speed}
        G1 X{x_min} Y{y_max} F{cfg.infill_speed}
        G1 X{x_max} Y{y_min} F{cfg.infill_speed}
    {% endfor %}

    # 4. Cross-hatch pattern (infill speed) - aggressive rectilinear infill
    {% for i in range(20) %}
        G1 X{x_min} Y{y_center} F{cfg.infill_speed}
        G1 X{x_max} Y{y_center} F{cfg.infill_speed}
    {% endfor %}
    {% for i in range(20) %}
        G1 X{x_center} Y{y_min} F{cfg.infill_speed}
        G1 X{x_center} Y{y_max} F{cfg.infill_speed}
    {% endfor %}

    # 5. Small detail work (HIGH SPEED) - rapid direction changes for maximum stress
    M117 LOW Z - DETAILS
    {% set detail_size = 10 %}
    {% for i in range(50) %}
        G1 X{x_center - detail_size} Y{y_center} F{cfg.small_feature_speed}
        G1 X{x_center + detail_size} Y{y_center} F{cfg.small_feature_speed}
        G1 X{x_center} Y{y_center - detail_size} F{cfg.small_feature_speed}
        G1 X{x_center} Y{y_center + detail_size} F{cfg.small_feature_speed}
    {% endfor %}

    # 6. Speed transitions (outer→inner→infill) - aggressive speed changes
    M117 LOW Z - SPEED TRANSITIONS
    {% for i in range(8) %}
        G1 X{x_min} Y{y_min} F{cfg.perimeter_speed}  # Outer wall
        G1 X{x_max} Y{y_min} F{cfg.perimeter_speed}
        G1 X{x_max} Y{y_max} F{cfg.inner_perimeter_speed}  # Inner wall
        G1 X{x_min} Y{y_max} F{cfg.inner_perimeter_speed}
        G1 X{x_max} Y{y_center} F{cfg.infill_speed}  # Infill
        G1 X{x_min} Y{y_center} F{cfg.infill_speed}
    {% endfor %}

    # 7. Travel moves (MAX SPEED) - aggressive diagonal movements
    M117 LOW Z - TRAVELS
    {% for i in range(15) %}
        G1 X{x_min} Y{y_min} F{cfg.travel_speed}
        G1 X{x_max} Y{y_max} F{cfg.travel_speed}
        G1 X{x_min} Y{y_max} F{cfg.travel_speed}
        G1 X{x_max} Y{y_min} F{cfg.travel_speed}
    {% endfor %}
    G1 X{x_center} Y{y_center} F3000

    # ===== MID Z TEST (Z200 - clearance for bed sensor) =====
    {action_respond_info("Test 2/3: MID Z (%dmm)" % cfg.z_mid_y)}
    M117 MID Z - PERIMETERS
    G1 Y{y_center} Z{cfg.z_mid_y} F3000
    G4 P2000

    # Repeat the same realistic print patterns at mid height
    {% for i in range(5) %}
        G1 X{x_min} Y{y_min} F{cfg.perimeter_speed}
        G1 X{x_max} Y{y_min} F{cfg.perimeter_speed}
        G1 X{x_max} Y{y_max} F{cfg.perimeter_speed}
        G1 X{x_min} Y{y_max} F{cfg.perimeter_speed}
        G1 X{x_min} Y{y_min} F{cfg.perimeter_speed}
    {% endfor %}

    M117 MID Z - CURVES
    {% for i in range(5) %}
        G1 X{x_center + radius} Y{y_center} F{cfg.inner_perimeter_speed}
        G3 X{x_center} Y{y_center + radius} I{-radius} J0 F{cfg.inner_perimeter_speed}
        G3 X{x_center - radius} Y{y_center} I0 J{-radius} F{cfg.inner_perimeter_speed}
        G3 X{x_center} Y{y_center - radius} I{radius} J0 F{cfg.inner_perimeter_speed}
        G3 X{x_center + radius} Y{y_center} I0 J{radius} F{cfg.inner_perimeter_speed}
    {% endfor %}

    M117 MID Z - INFILL
    {% for i in range(15) %}
        G1 X{x_min} Y{y_min} F{cfg.infill_speed}
        G1 X{x_max} Y{y_max} F{cfg.infill_speed}
        G1 X{x_min} Y{y_max} F{cfg.infill_speed}
        G1 X{x_max} Y{y_min} F{cfg.infill_speed}
    {% endfor %}

    {% for i in range(10) %}
        G1 X{x_min} Y{y_center} F{cfg.infill_speed}
        G1 X{x_max} Y{y_center} F{cfg.infill_speed}
    {% endfor %}
    {% for i in range(10) %}
        G1 X{x_center} Y{y_min} F{cfg.infill_speed}
        G1 X{x_center} Y{y_max} F{cfg.infill_speed}
    {% endfor %}

    M117 MID Z - DETAILS
    {% for i in range(20) %}
        G1 X{x_center - detail_size} Y{y_center} F{cfg.small_feature_speed}
        G1 X{x_center + detail_size} Y{y_center} F{cfg.small_feature_speed}
        G1 X{x_center} Y{y_center - detail_size} F{cfg.small_feature_speed}
        G1 X{x_center} Y{y_center + detail_size} F{cfg.small_feature_speed}
    {% endfor %}

    M117 MID Z - TRANSITIONS
    {% for i in range(3) %}
        G1 X{x_min} Y{y_min} F{cfg.perimeter_speed}
        G1 X{x_max} Y{y_min} F{cfg.perimeter_speed}
        G1 X{x_max} Y{y_max} F{cfg.inner_perimeter_speed}
        G1 X{x_min} Y{y_max} F{cfg.inner_perimeter_speed}
        G1 X{x_max} Y{y_center} F{cfg.infill_speed}
        G1 X{x_min} Y{y_center} F{cfg.infill_speed}
    {% endfor %}

    M117 MID Z - TRAVELS
    {% for i in range(8) %}
        G1 X{x_min} Y{y_min} F{cfg.travel_speed}
        G1 X{x_max} Y{y_max} F{cfg.travel_speed}
        G1 X{x_min} Y{y_max} F{cfg.travel_speed}
        G1 X{x_max} Y{y_min} F{cfg.travel_speed}
    {% endfor %}
    G1 X{x_center} Y{y_center} F3000

    # ===== HIGH Z TEST (Z300 - clearance for bed sensor) =====
    {action_respond_info("Test 3/3: HIGH Z (%dmm)" % cfg.z_high_y)}
    M117 HIGH Z - PERIMETERS
    G1 Y{y_center} Z{cfg.z_high_y} F3000
    G4 P2000

    # Same realistic print patterns at high Z (tests bed slinger at max height)
    {% for i in range(5) %}
        G1 X{x_min} Y{y_min} F{cfg.perimeter_speed}
        G1 X{x_max} Y{y_min} F{cfg.perimeter_speed}
        G1 X{x_max} Y{y_max} F{cfg.perimeter_speed}
        G1 X{x_min} Y{y_max} F{cfg.perimeter_speed}
        G1 X{x_min} Y{y_min} F{cfg.perimeter_speed}
    {% endfor %}

    M117 HIGH Z - CURVES
    {% for i in range(5) %}
        G1 X{x_center + radius} Y{y_center} F{cfg.inner_perimeter_speed}
        G3 X{x_center} Y{y_center + radius} I{-radius} J0 F{cfg.inner_perimeter_speed}
        G3 X{x_center - radius} Y{y_center} I0 J{-radius} F{cfg.inner_perimeter_speed}
        G3 X{x_center} Y{y_center - radius} I{radius} J0 F{cfg.inner_perimeter_speed}
        G3 X{x_center + radius} Y{y_center} I0 J{radius} F{cfg.inner_perimeter_speed}
    {% endfor %}

    M117 HIGH Z - INFILL
    {% for i in range(15) %}
        G1 X{x_min} Y{y_min} F{cfg.infill_speed}
        G1 X{x_max} Y{y_max} F{cfg.infill_speed}
        G1 X{x_min} Y{y_max} F{cfg.infill_speed}
        G1 X{x_max} Y{y_min} F{cfg.infill_speed}
    {% endfor %}

    {% for i in range(10) %}
        G1 X{x_min} Y{y_center} F{cfg.infill_speed}
        G1 X{x_max} Y{y_center} F{cfg.infill_speed}
    {% endfor %}
    {% for i in range(10) %}
        G1 X{x_center} Y{y_min} F{cfg.infill_speed}
        G1 X{x_center} Y{y_max} F{cfg.infill_speed}
    {% endfor %}

    M117 HIGH Z - DETAILS
    {% for i in range(20) %}
        G1 X{x_center - detail_size} Y{y_center} F{cfg.small_feature_speed}
        G1 X{x_center + detail_size} Y{y_center} F{cfg.small_feature_speed}
        G1 X{x_center} Y{y_center - detail_size} F{cfg.small_feature_speed}
        G1 X{x_center} Y{y_center + detail_size} F{cfg.small_feature_speed}
    {% endfor %}

    M117 HIGH Z - TRANSITIONS
    {% for i in range(3) %}
        G1 X{x_min} Y{y_min} F{cfg.perimeter_speed}
        G1 X{x_max} Y{y_min} F{cfg.perimeter_speed}
        G1 X{x_max} Y{y_max} F{cfg.inner_perimeter_speed}
        G1 X{x_min} Y{y_max} F{cfg.inner_perimeter_speed}
        G1 X{x_max} Y{y_center} F{cfg.infill_speed}
        G1 X{x_min} Y{y_center} F{cfg.infill_speed}
    {% endfor %}

    M117 HIGH Z - TRAVELS
    {% for i in range(8) %}
        G1 X{x_min} Y{y_min} F{cfg.travel_speed}
        G1 X{x_max} Y{y_max} F{cfg.travel_speed}
        G1 X{x_min} Y{y_max} F{cfg.travel_speed}
        G1 X{x_max} Y{y_min} F{cfg.travel_speed}
    {% endfor %}

    {action_respond_info("Test complete - settling...")}
    M117 SETTLING
    G1 X{x_center} Y{y_center} F3000
    G4 P3000

    {action_respond_info("==========================================")}
    {action_respond_info("Y-AXIS TEST COMPLETE!")}
    {action_respond_info("Analyze data and look at Y-axis frequencies")}
    {action_respond_info("==========================================")}
    M117 Y-AXIS DONE!


[gcode_macro INPUT_SHAPER_TEST_QUICK_X]
description: Quick X-axis test (single Z height, no heating)
gcode:
    {% set cfg = printer['gcode_macro _IS_SETTINGS'] %}
    {% set x_min = printer.toolhead.axis_minimum.x + 50 %}
    {% set x_max = printer.toolhead.axis_maximum.x - 50 %}
    {% set x_center = (printer.toolhead.axis_maximum.x / 2)|float %}
    {% set y_center = (printer.toolhead.axis_maximum.y / 2)|float %}

    {action_respond_info("Quick X-axis test (no heating)")}

    {% if printer.toolhead.homed_axes != "xyz" %}
        G28
    {% endif %}

    G90
    G1 X{x_center} Y{y_center} Z{cfg.z_mid} F3000

    M117 START CAPTURE NOW!
    G4 P5000

    M117 TESTING X-AXIS
    {% for i in range(cfg.test_rapid_moves) %}
        G1 X{x_min} F{cfg.test_speed_aggressive}
        G1 X{x_max} F{cfg.test_speed_aggressive}
    {% endfor %}

    G1 X{x_center} F3000
    G4 P2000

    {action_respond_info("Quick X test done!")}
    M117 X QUICK DONE


[gcode_macro INPUT_SHAPER_TEST_QUICK_Y]
description: Quick Y-axis test (single Z height, no heating)
gcode:
    {% set cfg = printer['gcode_macro _IS_SETTINGS'] %}
    {% set y_min = printer.toolhead.axis_minimum.y + 50 %}
    {% set y_max = printer.toolhead.axis_maximum.y - 50 %}
    {% set x_center = (printer.toolhead.axis_maximum.x / 2)|float %}
    {% set y_center = (printer.toolhead.axis_maximum.y / 2)|float %}

    {action_respond_info("Quick Y-axis test (no heating)")}

    {% if printer.toolhead.homed_axes != "xyz" %}
        G28
    {% endif %}

    G90
    G1 X{x_center} Y{y_center} Z{cfg.z_mid_y} F3000

    M117 START CAPTURE NOW!
    G4 P5000

    M117 TESTING Y-AXIS
    {% for i in range(cfg.test_rapid_moves) %}
        G1 Y{y_min} F{cfg.test_speed_aggressive}
        G1 Y{y_max} F{cfg.test_speed_aggressive}
    {% endfor %}

    G1 Y{y_center} F3000
    G4 P2000

    {action_respond_info("Quick Y test done!")}
    M117 Y QUICK DONE


################################################################################
# USAGE GUIDE
################################################################################
#
# FULL TEST (Recommended - 3 Z heights with heating):
#   INPUT_SHAPER_TEST_X  - For X-axis (mount sensor on toolhead)
#   INPUT_SHAPER_TEST_Y  - For Y-axis (mount sensor on bed)
#   Duration: ~80 seconds total
#
# QUICK TEST (Single Z height, no heating):
#   INPUT_SHAPER_TEST_QUICK_X
#   INPUT_SHAPER_TEST_QUICK_Y
#   Duration: ~20 seconds total
#
# WORKFLOW:
# 1. Mount sensor appropriately
# 2. Start Python capture: sudo python3 resonance_analyzer.py --port /dev/ttyACM0 --duration 90 --save test.csv
# 3. Run macro within 5 seconds
# 4. Wait for completion
# 5. Analyze: python3 resonance_analyzer.py --load test.csv --plot
# 6. Look at relevant axis data (X for toolhead test, Y for bed test)
# 7. Average the frequencies from low/mid/high Z if they differ
# 8. Update printer.cfg [input_shaper] section
#
# TEMPERATURE ADJUSTMENT:
# Modify temperatures in [gcode_macro _IS_SETTINGS] for your material
#
# Z-HEIGHT ADJUSTMENT:
# X-axis: Modify z_low, z_mid, z_high (default: 20, 150, 270mm)
# Y-axis: Modify z_low_y, z_mid_y, z_high_y (default: 100, 200, 300mm)
# Y-axis uses higher Z-heights to provide clearance for sensor on bed
#
################################################################################
