# ===================================================================
# M108 FAN PERCENTAGE CONTROL
# ===================================================================
# Allows dynamic adjustment of fan power without changing slicer G-code
# Usage: M108 P0.5  (sets fans to 50% of commanded speed)
#        M108 P1.0  (resets to 100%)
# ===================================================================

[gcode_macro M108]
description: Adjust fan power percentage
variable_fan_percent: 1.0
variable_last_s_value: 255
gcode:
    {% set P = params.P|default(1.0)|float %}

    # Update fan percentage
    SET_GCODE_VARIABLE MACRO=M108 VARIABLE=fan_percent VALUE={P}

    # Reapply last M106 command with new percentage
    {% set speed = (last_s_value * P / 255.0)|float %}
    M106 S{(speed * 255)|int}

    {action_respond_info("Fan percentage set to %.1f%%" % (P * 100))}

# Override M106 to track the S value
[gcode_macro M106]
rename_existing: M106.1
gcode:
    {% set S = params.S|default(255)|float %}

    # Store the S value for M108
    SET_GCODE_VARIABLE MACRO=M108 VARIABLE=last_s_value VALUE={S}

    # Get current fan percentage
    {% set fan_percent = printer["gcode_macro M108"].fan_percent|float %}

    # Apply percentage to speed
    {% set adjusted_speed = (S * fan_percent)|int %}

    # Call original M106 with adjusted speed
    M106.1 S{adjusted_speed}
