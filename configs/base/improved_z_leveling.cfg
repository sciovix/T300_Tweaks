# ============================================================================
# IMPROVED Z-AXIS LEVELING SOLUTIONS FOR COMGROW T300
# ============================================================================
# Choose the approach that works best for you by uncommenting the desired macro
# and commenting out the original Z_TILT_CALIBRATION in Macro.cfg
#
# Three approaches provided:
# 1. GENTLE_Z_TILT - Improved automated leveling (less noise, slower)
# 2. MANUAL_Z_SYNC - Interactive manual adjustment helper
# 3. QUICK_Z_CHECK - Verification only (use with bed mesh compensation)
# ============================================================================


# ============================================================================
# OPTION 1: GENTLE Z-TILT (Recommended)
# ============================================================================
# Improved automated leveling that's quieter and more controlled
# Uses multiple gentle movements instead of one harsh forced movement
# ============================================================================

[gcode_macro GENTLE_Z_TILT]
description: Gentle automated Z-axis leveling (quieter than stock)
gcode:
    {% set z_max = printer.configfile.settings['stepper_z'].position_max|int %}
    {% set z_target = (z_max * 0.85)|int %}  # Only go to 85% of max instead of 100%

    RESPOND MSG="Starting gentle Z-tilt leveling..."

    # Home all axes
    G28

    # Move to center for stability
    G90
    G1 X150 Y150 F6000

    RESPOND MSG="Raising to leveling height slowly..."

    # Raise in stages instead of one fast movement (quieter)
    G1 Z{(z_target * 0.33)|int} F600   # First third at slow speed
    G1 Z{(z_target * 0.66)|int} F800   # Second third slightly faster
    G1 Z{z_target} F1000                # Final third

    # Small oscillation to help settle the gantry (reduces binding noise)
    G1 Z{z_target - 5} F500
    G1 Z{z_target} F500
    G1 Z{z_target - 5} F500
    G1 Z{z_target} F500

    RESPOND MSG="Re-homing Z axis..."

    # Re-home Z to establish level
    G28 Z

    RESPOND MSG="Gentle Z-tilt complete!"


# ============================================================================
# OPTION 2: MANUAL Z-SYNC (Interactive)
# ============================================================================
# Helps you manually adjust Z-axis screws by measuring and guiding you
# Best for one-time setup, then rely on bed mesh for ongoing compensation
# ============================================================================

[gcode_macro MANUAL_Z_SYNC]
description: Interactive manual Z-axis synchronization helper
gcode:
    RESPOND MSG="=== Manual Z-Axis Sync Helper ==="

    # Home all axes
    G28

    RESPOND MSG="Probing left side..."
    G90
    G1 X50 Y150 F6000
    PROBE
    {% set left_z = printer.probe.last_z_result %}

    RESPOND MSG="Probing right side..."
    G1 X250 Y150 F6000
    PROBE
    {% set right_z = printer.probe.last_z_result %}

    {% set diff = (left_z - right_z)|abs %}
    {% set diff_mm = "%.3f"|format(diff) %}

    RESPOND MSG="=== Results ==="
    RESPOND MSG="Left side:  {left_z}mm"
    RESPOND MSG="Right side: {right_z}mm"
    RESPOND MSG="Difference: {diff_mm}mm"

    {% if diff < 0.05 %}
        RESPOND MSG="✓ Gantry is level! (within 0.05mm tolerance)"
    {% elif left_z > right_z %}
        RESPOND MSG="⚠ LEFT side is HIGHER - Turn LEFT screw CLOCKWISE"
        RESPOND MSG="   Approximately {(diff * 0.25)|round(1)} turns"
    {% else %}
        RESPOND MSG="⚠ RIGHT side is HIGHER - Turn RIGHT screw CLOCKWISE"
        RESPOND MSG="   Approximately {(diff * 0.25)|round(1)} turns"
    {% endif %}

    RESPOND MSG="Run MANUAL_Z_SYNC again after adjustments to verify"

    # Return to safe position
    G1 Z10 F600
    G1 X150 Y150 F6000


# ============================================================================
# OPTION 3: QUICK Z-CHECK (Verification Only)
# ============================================================================
# Just measures and reports tilt without attempting to fix it
# Use this if you prefer to manually level once and rely on bed mesh
# ============================================================================

[gcode_macro QUICK_Z_CHECK]
description: Quick check of Z-axis tilt (measurement only)
gcode:
    RESPOND MSG="Checking Z-axis level..."

    G28

    # Probe three points across the gantry
    G90
    G1 X50 Y150 F6000
    PROBE
    {% set left = printer.probe.last_z_result %}

    G1 X150 Y150 F6000
    PROBE
    {% set center = printer.probe.last_z_result %}

    G1 X250 Y150 F6000
    PROBE
    {% set right = printer.probe.last_z_result %}

    {% set max_diff = [left - center, center - right, left - right]|map('abs')|max %}

    RESPOND MSG="Left: {left} | Center: {center} | Right: {right}"
    RESPOND MSG="Max difference: {'%.3f'|format(max_diff)}mm"

    {% if max_diff < 0.05 %}
        RESPOND MSG="✓ Excellent! Gantry is level"
    {% elif max_diff < 0.1 %}
        RESPOND MSG="✓ Good! Within acceptable tolerance"
    {% elif max_diff < 0.2 %}
        RESPOND MSG="⚠ Fair - Consider manual adjustment"
    {% else %}
        RESPOND MSG="⚠ Poor - Manual adjustment recommended"
    {% endif %}

    G1 Z10 F600


# ============================================================================
# HELPER MACRO: Disable Stock Z-Tilt
# ============================================================================
# Uncomment this to override the noisy stock Z_TILT_CALIBRATION macro
# It will redirect to GENTLE_Z_TILT instead
# ============================================================================

# [gcode_macro Z_TILT_CALIBRATION]
# rename_existing: Z_TILT_CALIBRATION_ORIGINAL
# gcode:
#     RESPOND MSG="Using improved gentle Z-tilt instead of stock version"
#     GENTLE_Z_TILT


# ============================================================================
# RECOMMENDED WORKFLOW
# ============================================================================
#
# FOR BEST RESULTS:
#
# 1. Initial Setup (One Time):
#    - Run MANUAL_Z_SYNC
#    - Adjust Z-screws as instructed
#    - Repeat until difference < 0.05mm
#
# 2. Before Each Print:
#    - Run QUICK_Z_CHECK to verify (optional)
#    - Let START_PRINT handle bed mesh calibration
#    - Bed mesh will compensate for minor variations
#
# 3. If Gantry Gets Knocked/Shifted:
#    - Run GENTLE_Z_TILT (quieter than stock)
#    - Or use MANUAL_Z_SYNC for precision
#
# 4. Regular Maintenance:
#    - Check belt tension monthly
#    - Verify lead screw anti-backlash nuts
#    - Run QUICK_Z_CHECK to monitor drift
#
# ============================================================================
