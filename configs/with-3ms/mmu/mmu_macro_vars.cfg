#
# Supporting set of macros supplied with Happy Hare can be customized by editing the macro "variables" declared here.
#
# This configuration will automatically retained and upgraded between releases (a backup of previous config files will
# always be made for your reference). If you want to customize macros beyond what is possible through these variables
# it is highly recommended you copy the macro to a new name and change the callback macro name in 'mmu_parameters.cfg'
# That way the default macros can still be upgraded but your customization will be left intact
#


# PERSISTED STATE ---------------------------------------------------------
# Happy Hare stores configuration and state in the klipper variables file.
# Since klipper can only be a single 'save_variables' file, if you already
# have one you will need to merge the two and point this appropriately.
#
[save_variables]
filename: ~/printer_data/config/mmu/mmu_vars.cfg


# NECESSARY KLIPPER OVERRIDES ---------------------------------------------
[extruder]
max_extrude_only_distance: 200
max_extrude_cross_section: 50

# For dialog prompts and progress in Mainsail. Requires Mainsail version >= v2.9.0
[respond]

# Other Happy Hare prerequisites. Harmless if already defined elsewhere in user config
[display_status]
[pause_resume]
[virtual_sdcard]
path: ~/printer_data/gcodes
#on_error_gcode: CANCEL_PRINT


# PRINT START/END ---------------------------------------------------------
[gcode_macro _MMU_SOFTWARE_VARS]
description: Happy Hare optional configuration for print start/end checks
gcode: # Leave empty

variable_user_pre_initialize_extension      : '_MMU_PRE_PRINT_REMAP'	; Executed at start of MMU_START_SETUP
variable_home_mmu                           : False
variable_check_gates                        : True
variable_load_initial_tool                  : True
variable_automap_strategy                   : "none"	; none|filament_name|material|color|closest_color|spool_id

variable_user_print_end_extension           : ''
variable_unload_tool                        : True
variable_reset_ttg                          : False
variable_dump_stats                         : True


# STATE MACHINE CHANGES ---------------------------------------------------
[gcode_macro _MMU_STATE_VARS]
description: Happy Hare configuration for state change hooks
gcode: # Leave empty

variable_user_action_changed_extension      : ''
variable_user_print_state_changed_extension : ''
variable_user_mmu_event_extension           : ''

variable_servo_down_limit                   : 5000
variable_cutter_blade_limit                 : 3000


# SEQUENCE MACRO - PARKING MOVEMENT AND TOOLCHANGE CONTROL ----------------
[gcode_macro _MMU_SEQUENCE_VARS]
description: Happy Hare sequence macro configuration variables
gcode: # Leave empty

variable_enable_park_printing   : 'toolchange,runout,load,unload,complete,pause,cancel'
variable_enable_park_standalone : 'toolchange,load,unload,pause,cancel'
variable_enable_park_disabled   : 'pause,cancel'

variable_min_toolchange_z       : 1.0

# Park positions: x,y,z-hop,z_hop_ramp,retract
# Back-left corner keeps blob purge and parking in same area
variable_park_toolchange        : 10, 290, 5, 5, 2
variable_park_runout            : 10, 290, 5, 5, 2
variable_park_pause             : 10, 290, 5, 0, 2
variable_park_cancel            : -999, -999, 5, 0, 5
variable_park_complete           : 10, 290, 5, 0, 5

variable_pre_unload_position    : -999, -999, 0
variable_post_form_tip_position : -999, -999, 0
variable_pre_load_position      : -999, -999, 0

variable_restore_xy_pos         : "last"

variable_park_travel_speed      : 200
variable_park_lift_speed        : 15
variable_retract_speed          : 30
variable_unretract_speed        : 30

variable_user_park_move_macro   : ''

variable_auto_home              : True
variable_timelapse              : False

variable_user_mmu_error_extension     : ''
variable_user_pre_unload_extension    : ''
# Called after tip forming on runout - ejects old stub as blob at park corner
variable_user_post_form_tip_extension : '_MMU_ENDLESS_SPOOL_STUB_PURGE'
variable_user_post_unload_extension   : ''
variable_user_pre_load_extension      : ''
variable_user_post_load_extension     : ''


# CUT_TIP -----------------------------------------------------------------
[gcode_macro _MMU_CUT_TIP_VARS]
description: Happy Hare toolhead tip cutting macro configuration variables
gcode: # Leave empty

variable_restore_position       : False
variable_blade_pos              : 37.5
variable_retract_length         : 32.5
variable_simple_tip_forming     : True
variable_cut_axis_steppers      : 'stepper_x, stepper_y'
variable_cut_stepper_current    : 100
variable_cutting_axis           : "x"
variable_pin_loc_xy             : 14, 250
variable_pin_park_dist          : 5.0
variable_pin_loc_compressed_xy  : 0.5, 250
variable_rip_length             : 1.0
variable_rip_speed              : 3
variable_pushback_length        : 15.0
variable_pushback_dwell_time    : 0
variable_travel_speed           : 150
variable_cut_fast_move_speed    : 32
variable_cut_slow_move_speed    : 8
variable_evacuate_speed         : 150
variable_cut_dwell_time         : 50
variable_cut_fast_move_fraction : 1.0
variable_extruder_move_speed    : 25
variable_safe_margin_xy         : 30, 30
variable_gantry_servo_enabled   : False
variable_gantry_servo_down_angle: 55
variable_gantry_servo_up_angle  : 180


# FORM_TIP ----------------------------------------------------------------
[gcode_macro _MMU_FORM_TIP_VARS]
description: Happy Hare tip forming macro configuration variables
gcode: # Leave empty

variable_ramming_volume            : 0
variable_ramming_volume_standalone : 0

# Cool to 200C before tip separation to get clean break (PLA/PETG/ASA tuned)
variable_toolchange_temp        : 200
variable_toolchange_fan_assist  : True
variable_toolchange_fan_name    : ''
variable_toolchange_fan_speed   : 100

variable_unloading_speed_start  : 60
variable_unloading_speed        : 20

# Dragon/Revo-style hotend: cooling tube starts at 35mm from nozzle tip
variable_cooling_tube_position  : 35
variable_cooling_tube_length    : 10
variable_initial_cooling_speed  : 10
variable_final_cooling_speed    : 20
# 0 cooling moves - tip forms cleanly at 200C, no cooling moves needed
variable_cooling_moves          : 0

variable_use_skinnydip          : False
variable_skinnydip_distance     : 40
variable_dip_insertion_speed    : 8
variable_dip_extraction_speed   : 20
variable_melt_zone_pause        : 600
variable_cooling_zone_pause     : 600
variable_use_fast_skinnydip     : False

variable_parking_distance       : 0
variable_extruder_eject_speed   : 25


# PURGE -------------------------------------------------------------------
[gcode_macro _MMU_PURGE_VARS]
description: Happy Hare reference purging macro configuration variables
gcode: # Leave empty

variable_extruder_purge_speed   : 2


# CLIENT MACROS -----------------------------------------------------------
[gcode_macro _MMU_CLIENT_VARS]
description: Happy Hare client macro configuration variables
gcode: # Leave empty

variable_reset_ttg_on_cancel    : False
variable_unload_tool_on_cancel  : False
variable_user_pause_extension   : ''
variable_user_resume_extension  : ''
variable_user_cancel_extension  : ''


###########################################################################
# Tool change macros - 4 gates for 3MS
###########################################################################
[gcode_macro T0]
gcode: MMU_CHANGE_TOOL TOOL=0
[gcode_macro T1]
gcode: MMU_CHANGE_TOOL TOOL=1
[gcode_macro T2]
gcode: MMU_CHANGE_TOOL TOOL=2
[gcode_macro T3]
gcode: MMU_CHANGE_TOOL TOOL=3
