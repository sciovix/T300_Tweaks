[gcode_macro global_var]
variable_pause_park:{'x': 10, 'y': 290, 'z': 10, 'e': 1}
variable_z_maximum_lifting_distance: 350
variable_pause_resume_travel_speed: 100
variable_bed_mesh_calibrate_target_temp: 65
variable_load_filament_extruder_temp: 220
gcode:


[gcode_macro _ALL_FAN_OFF]
gcode:
    M106 S0
    M107


[gcode_macro PROBE_CALIBRATE]
rename_existing:PROBE_CALIBRATE_BASE
gcode:
    {% set current_target_temp  = printer.heater_bed.target|int %}
    {% set z_offset_calibrate_temp = printer['gcode_macro global_var'].bed_mesh_calibrate_target_temp|int %}
    {% set max_z_offset_calibrate_temp = (printer['gcode_macro global_var'].bed_mesh_calibrate_target_temp|int + 1) %}

    {action_respond_info("z_offset_calibrate")}
    {% if printer.heater_bed.temperature != z_offset_calibrate_temp %}
        M140 S{z_offset_calibrate_temp}
        {action_respond_info("The bed target temperature was not reached!")}
        {action_respond_info("Adjust the temperature now!")}
        M190 S{z_offset_calibrate_temp}
    {% endif %}

    G28
    PROBE_CALIBRATE_BASE
    TESTZ z=-4

[gcode_macro BED_MESH_CALIBRATE]
rename_existing: BED_MESH_CALIBRATE_BASE
gcode:
    {% set mesh_name = "default" %}
    {% set mesh_calibrate_temp = printer['gcode_macro global_var'].bed_mesh_calibrate_target_temp|int %}
    {% set max_mesh_calibrate_temp = (printer['gcode_macro global_var'].bed_mesh_calibrate_target_temp|int + 1) %}
    {% set current_target_temp  = printer.heater_bed.target|int %}

    {action_respond_info("Check Heating!")}
    {% if printer.heater_bed.temperature != mesh_calibrate_temp %}
        M140 S{mesh_calibrate_temp}
        {action_respond_info("The bed target temperature was not reached!")}
        {action_respond_info("Adjust the temperature!")}
        M190 S{mesh_calibrate_temp}
    {% endif %}

    {% if printer.toolhead.homed_axes|lower != "xyz" %}
        G28
    {% endif %}

    BED_MESH_CLEAR
    BED_MESH_CALIBRATE_BASE {rawparams}

    {% if current_target_temp == 0 %}
        M140 S0
    {% endif %}


[delayed_gcode _print_start_wait]
gcode:
    {% if printer['gcode_macro START_PRINT'].state == 'Heating'%}
        {action_respond_info("Prepare->Heating!")}
    {% elif printer['gcode_macro START_PRINT'].state == 'Start' %}
        {action_respond_info("Heating->Start!")}
    {% endif %}

    {% if printer['gcode_macro START_PRINT'].execute|lower != 'false' %}
        START_PRINT
    {% endif %}

[gcode_macro START_PRINT]
description:
variable_state: 'Prepare'
variable_record_extruder_temp:0
variable_max_record_extruder_temp:0
gcode:
    {% set mesh_name = "default" %}
    {% set mesh_calibrate_temp = printer['gcode_macro global_var'].bed_mesh_calibrate_target_temp|int %}

    {% set extruder_target_temp = printer.extruder.target|int %}
    {% set max_extruder_target_temp = (extruder_target_temp + 2) %}

    {% set bed_targer_temp = printer.heater_bed.target if printer.heater_bed.target else 65|int %}
    {% set max_bed_targer_temp = (bed_targer_temp + 2) %}

    M400

    CLEAR_PAUSE

    # SAVE_VARIABLE VARIABLE=was_interrupted VALUE=True
    save_last_file

    G90
    {% if state == 'Prepare' %}

        {action_respond_info("Prepare!")}

        {% if printer.toolhead.homed_axes|lower != "xyz" %}
            G28
        {% endif %}

        ; filament check removed - MMU handles filament detection

        {action_respond_info("Check Heating!")}

        M140 S{bed_targer_temp}
        M104 S{extruder_target_temp}

        {% if printer.heater_bed.temperature < bed_targer_temp %}
            M117 Bed heating...
            {action_respond_info("Bed heating...")}
            M190 S{bed_targer_temp}
        {% endif %}

        {% if printer.extruder.temperature < extruder_target_temp %}
            M117 Extruder heating...
            {action_respond_info("Extruder heating...")}
            M109 S{extruder_target_temp}
        {% endif %}

        BED_MESH_CALIBRATE ADAPTIVE=1

        SET_GCODE_VARIABLE MACRO=START_PRINT VARIABLE=state VALUE='"Start"'
        UPDATE_DELAYED_GCODE ID=_print_start_wait DURATION=0.5

    {% elif state == 'Start' %}
        M117 Printing now!!!
        {action_respond_info("Start!")}
    {% endif %}

    {% if state == 'Start' %}
        {action_respond_info("Start!")}
    {% endif %}



[gcode_macro END_PRINT]
description:
variable_state: 'normal'
gcode:
    {% set z_max = printer['gcode_macro global_var'].z_maximum_lifting_distance|int %}
    {% set e_mintemp  = printer.configfile.settings['extruder'].min_extrude_temp %}

    M400
    SET_GCODE_VARIABLE MACRO=START_PRINT VARIABLE=state VALUE='"Prepare"'
    SET_GCODE_VARIABLE MACRO=START_PRINT VARIABLE=record_extruder_temp VALUE=0
    SET_GCODE_VARIABLE MACRO=START_PRINT VARIABLE=max_record_extruder_temp VALUE=0

    G91
    {% if (printer.extruder.target != 0 and printer.extruder.temperature >= printer.extruder.target) or
          printer.extruder.temperature >= e_mintemp
    %}
        G1 E-2 F2700
        G1 E-2 Z0.2 F2400
    {% endif %}

    {% if (printer.gcode_move.position.z + 10) < z_max %}
        G1 Z+10 F3000
    {% else %}
        G1 Z+{(z_max - printer.gcode_move.position.z)} F3000
    {% endif %}
    G90
    G1 X0 Y300

    _ALL_FAN_OFF
    TURN_OFF_HEATERS

    M84 X Y Z E

    M220 S100
    M221 S100

    CLEAR_PAUSE

    # SAVE_VARIABLE VARIABLE=was_interrupted VALUE=False
    RUN_SHELL_COMMAND CMD=clear_plr
    clear_last_file

    {action_respond_info("Finish Print!")}


[gcode_macro PAUSE]
rename_existing: PAUSE_BASE
variable_state: 'normal'
gcode:
    {% set x_park = printer['gcode_macro global_var'].pause_park.x|float %}
    {% set y_park = printer['gcode_macro global_var'].pause_park.y|float %}
    {% set e_restract = printer['gcode_macro global_var'].pause_park.e|float %}
    {% set z_lift_max = printer['gcode_macro global_var'].z_maximum_lifting_distance %}
    {% set state = params.STATE if 'filament_change' in params.STATE else 'normal' %}
    {% set extruder_temp = printer['gcode_macro global_var'].load_filament_extruder_temp|int %}

    # --- MMU endless spool auto-recovery (extruder runout, no gate sensors) ---
    {% set ns = namespace(do_recovery=False, next_gate=-1, cur_gate=-1, extruder_runout=False) %}
    {% if printer.mmu is defined and printer.mmu.runout and printer.mmu.enabled %}
        {% set ns.cur_gate = printer.mmu.gate %}
        {% set cur_group = printer.mmu.endless_spool_groups[ns.cur_gate] %}
        {% for g in range(printer.mmu.endless_spool_groups|length) %}
            {% if g != ns.cur_gate and printer.mmu.endless_spool_groups[g] == cur_group and printer.mmu.gate_status[g] == 2 and ns.next_gate == -1 %}
                {% set ns.next_gate = g %}
            {% endif %}
        {% endfor %}
        {% if ns.next_gate >= 0 %}
            {% set ns.do_recovery = True %}
        {% endif %}
    {% elif printer.mmu is defined and printer.mmu.enabled and printer.mmu.endless_spool_enabled and
            "runout occured at extruder" in (printer.mmu.reason_for_pause|default("")) %}
        {% set ns.cur_gate = printer.mmu.gate %}
        {% set cur_group = printer.mmu.endless_spool_groups[ns.cur_gate] %}
        {% for g in range(printer.mmu.endless_spool_groups|length) %}
            {% if g != ns.cur_gate and printer.mmu.endless_spool_groups[g] == cur_group
                  and printer.mmu.gate_status[g] >= 1 and ns.next_gate == -1 %}
                {% set ns.next_gate = g %}
            {% endif %}
        {% endfor %}
        {% if ns.next_gate >= 0 %}
            {% set ns.do_recovery = True %}
            {% set ns.extruder_runout = True %}
        {% endif %}
    {% endif %}

    {% if ns.do_recovery %}
        {% if ns.extruder_runout %}
        {action_respond_info("MMU Extruder Sensor Runout: Auto-switching gate %d -> gate %d" % (ns.cur_gate, ns.next_gate))}
        {% else %}
        {action_respond_info("MMU Runout: Auto-switching gate %d -> gate %d" % (ns.cur_gate, ns.next_gate))}
        {% endif %}
        PAUSE_BASE
        G91
        {% if (printer.gcode_move.position.z + 5) < z_lift_max %}
            G1 Z+5 F3000
        {% else %}
            G1 Z+{(z_lift_max - printer.gcode_move.position.z)} F3000
        {% endif %}
        G90
        G1 X{x_park} Y{y_park} F{printer["gcode_macro global_var"].pause_resume_travel_speed * 60}
        M104 S{printer.extruder.target}
        SET_GCODE_VARIABLE MACRO=_MMU_ENDLESS_SPOOL_STATE VARIABLE=next_gate VALUE={ns.next_gate}
        SET_GCODE_VARIABLE MACRO=_MMU_ENDLESS_SPOOL_STATE VARIABLE=cur_gate VALUE={ns.cur_gate}
        {% if ns.extruder_runout %}
        SET_GCODE_VARIABLE MACRO=_MMU_ENDLESS_SPOOL_STATE VARIABLE=extruder_runout VALUE=1
        {% else %}
        SET_GCODE_VARIABLE MACRO=_MMU_ENDLESS_SPOOL_STATE VARIABLE=extruder_runout VALUE=0
        {% endif %}
        UPDATE_DELAYED_GCODE ID=_mmu_endless_spool_switch DURATION=2.0
    {% else %}
        {action_respond_info("Pause Print!")}
        PAUSE_BASE
        G91
        {% if (printer.gcode_move.position.z + 5) < z_lift_max %}
            G1 Z+5 F3000
        {% else %}
            G1 Z+{(z_lift_max - printer.gcode_move.position.z)} F3000
        {% endif %}
        G90
        {% if printer.gcode_move.position.x != x_park and
                printer.gcode_move.position.y != y_park
        %}
            G1 X{x_park} Y{y_park} F{printer["gcode_macro global_var"].pause_resume_travel_speed * 60}
        {% endif %}
        M104 S{printer.extruder.target}
        {% if state == 'normal' %}
            {% if printer.extruder.temperature < printer.extruder.target %}
                G91
                G1 E-{e_restract} F300
                G90
            {% endif %}
        {% elif state == 'filament_change' %}
            {% if printer.extruder.temperature < printer.extruder.target %}
                G91
                G1 E-30 F300
                G90
            {% endif %}
        {% endif %}
    {% endif %}


[delayed_gcode _resume_wait]
gcode:
    {% if printer['gcode_macro RESUME'].execute|lower != 'false' %}
        RESUME
    {% endif %}


[gcode_macro RESUME]
description: Pause the actual running print
rename_existing: RESUME_BASE
variable_state: 'normal'
gcode:
    {% set e_restract = printer['gcode_macro global_var'].pause_park.e|float %}
    {% set extruder_temp = printer['gcode_macro global_var'].load_filament_extruder_temp|int %}

    {% set extruder_target_temp = printer.extruder.target|int %}
    {% set max_extruder_target_temp = (extruder_target_temp + 2) %}


    {% if params.STATE == 'filament_change' %}
        {% if printer.extruder.temperature < printer.extruder.target %}
            {action_respond_info("Extruder not hot enough!")}
            {action_respond_info("Heating now!")}
            M109 S{extruder_target_temp}
            G91
            G1 E30 F300
            G1 E10 F150
            G90
        {% else %}
            G91
            G1 E30 F300
            G1 E10 F150
            G90
        {% endif %}

        {action_respond_info("Print resumming!")}
        RESUME_BASE
    {% elif state == 'normal' %}
        {action_respond_info("Print resumming!")}
        G91
        G1 E{e_restract} F300
        G90
        RESUME_BASE
    {% endif %}


[gcode_macro CANCEL_PRINT]
description:
rename_existing: CANCEL_PRINT_BASE
gcode:
    {% set x_park = printer['gcode_macro global_var'].pause_park.x|float %}
    {% set y_park = printer['gcode_macro global_var'].pause_park.y|float %}
    {% set z_park = printer['gcode_macro global_var'].pause_park.z|float %}
    {% set z_lift_max = printer['gcode_macro global_var'].z_maximum_lifting_distance %}
    {% set e_restract = printer['gcode_macro global_var'].pause_park.e|float %}
    {% set e_mintemp  = printer.configfile.settings['extruder'].min_extrude_temp %}

    CANCEL_PRINT_BASE

    G91
    {% if (printer.extruder.target != 0 and printer.extruder.temperature >= printer.extruder.target) or
          printer.extruder.temperature >= e_mintemp
    %}
        G1 E-{e_restract} F500
    {% else %}
        {action_respond_info("Extruder not hot enough")}
    {% endif %}

    {% if printer.pause_resume.is_paused == True %}
        {% if printer.gcode_move.position.x != x_park and
              printer.gcode_move.position.y != y_park
        %}
            {%if (printer.gcode_move.position.z + 10) < z_lift_max %}
                G1 Z+10 F3000
            {% else %}
                G1 Z+{(z_lift_max - printer.gcode_move.position.z)} F3000
            {% endif %}
            G90
            G1 X{x_park} Y{y_park} F6000
        {% endif %}
    {% else %}
        {% if "xyz" not in printer.toolhead.homed_axe %}
            {%if (printer.gcode_move.position.z + 10) < z_lift_max %}
                G1 Z+10 F3000
            {% else %}
                G1 Z+{(z_lift_max - printer.gcode_move.position.z)} F3000
            {% endif %}
        {% endif %}
        G90
        G1 X{x_park} Y{y_park} F6000
    {% endif %}

    TURN_OFF_HEATERS
    _ALL_FAN_OFF

    CLEAR_PAUSE

    # SAVE_VARIABLE VARIABLE=was_interrupted VALUE=False
    RUN_SHELL_COMMAND CMD=clear_plr
    clear_last_file

    {action_respond_info("Cancel Print Success!")}
    SET_GCODE_VARIABLE MACRO=START_PRINT VARIABLE=state VALUE='"Prepare"'
    SET_GCODE_VARIABLE MACRO=START_PRINT VARIABLE=record_extruder_temp VALUE=0
    SET_GCODE_VARIABLE MACRO=START_PRINT VARIABLE=max_record_extruder_temp VALUE=0

    M84 X Y Z E

[gcode_macro DEFAULT_LOAD_FILAMENT]
gcode:
    G91         #load
    G1 E60 F300
    G90
    G4 P700

[gcode_macro DEFAULT_UNLOAD_FILAMENT]
gcode:
    G91         #load
    G1 E20 F300
    G90
    G91         #unload
    G1 E-20 F900
    G90
    G91         #unload
    G1 E-40 F180
    G90
    G4 P700

[gcode_macro PRINTING_UNLOAD_FILAMENT]
gcode:
    G91         #load
    G1 E15 F300
    G90
    G91         #unload
    G1 E-50 F600
    G90
    G4 P700

[gcode_macro M600]
gcode:
    PAUSE
    PRINTING_UNLOAD_FILAMENT


[gcode_macro PAUSE_UNLOAD_FILAMENT]
description: Pauses the current print.
gcode:
    PAUSE STATE='filament_change'
    M400


[gcode_macro LOAD_FILAMENT_RESUME]
gcode:
    RESUME STATE='filament_change'


[gcode_macro heated_bed]
gcode:
	# {% if printer.heater_bed.temperature <= printer['gcode_macro global_var'].bed_mesh_calibrate_target_temp %}
		M190 S{printer['gcode_macro global_var'].bed_mesh_calibrate_target_temp}
	# {% endif %}


[gcode_macro QUERY_ZOFFSET]
gcode:
	M118 {printer.configfile.settings['probe'].z_offset}


[gcode_macro Z_TILT_CALIBRATION]
gcode:
    {% set z_lift =  printer.configfile.settings['stepper_z'].position_max|int %}

    G28
    G90
    G1 Z{z_lift}
    G28 Z


[gcode_macro plr_temperature_wait]
gcode:
    {% set extruder_target_temp = printer.extruder.target|int %}

    {% set bed_targer_temp = printer.heater_bed.target|int %}

    M190 S{bed_targer_temp}
    M109 S{extruder_target_temp}

[gcode_macro M109]
rename_existing: M99109
gcode:
    {% set s = params.S|float %}
    M104 {% for p in params %}{'%s%s' % (p, params[p])}{% endfor %}
    {% if s != 0 %}
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={s-1} MAXIMUM={s+1}
    {% endif %}

[gcode_macro M190]

rename_existing: M99190
gcode:
    {% set s = params.S|float %}
    M140 {% for p in params %}{'%s%s' % (p, params[p])}{% endfor %}
    {% if s != 0 %}
        TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={s-1} MAXIMUM={s+1}
    {% endif %}


###########################################################################
# Blob Purge Macro for 3MS MMU - Comgrow T300
# Parks at back-left corner (X=10, Y=290), deposits any ooze on bed,
# builds a solid blob while slowly rising, cools, then knocks it off.
#
# Requires in mmu_parameters.cfg:
#   force_purge_standalone: 1
#   purge_macro: _MMU_BLOB_PURGE
#
# Requires in mmu_macro_vars.cfg:
#   variable_park_toolchange: 10, 290, 10, 5, 2
###########################################################################

[gcode_macro _MMU_BLOB_PURGE]
description: Blob purge at back-left corner with auto knock-off
gcode:
    # ---- Configuration ----
    {% set blob_z        = 1.5   %}  # Z to start blob (higher = less bed contact = less sticking)
    {% set base_e        = 8     %}  # Small anchor extrusion at blob_z (mm)
    {% set rise_mm       = 15    %}  # Total Z rise during taper
    {% set rise_segs     = 4     %}  # Number of taper segments
    {% set purge_speed   = 180   %}  # Extrusion speed mm/min (3mm/s)
    {% set min_purge_mm  = 70    %}  # Minimum filament to purge (mm)
    {% set cool_ms       = 8000  %}  # Fan cooling time ms
    {% set knock_x_right = 35    %}  # X right of blob for knock approach
    {% set knock_x_left  = -2    %}  # X to sweep to (off bed edge)
    {% set knock_z       = 1    %}   # Z height for knock sweep

    {% set sequence_vars = printer["gcode_macro _MMU_SEQUENCE_VARS"] %}
    {% set park_vars = printer["gcode_macro _MMU_PARK"] %}
    {% set retracted_length = park_vars.retracted_length|default(0)|float %}
    {% set retract_speed = sequence_vars.retract_speed|default(30)|int %}
    {% set unretract_speed = sequence_vars.unretract_speed|default(30)|int %}

    {% set purge_volume = printer.mmu.toolchange_purge_volume|default(0)|float %}
    {% set fil_dia = printer.configfile.config.extruder.filament_diameter|default(1.75)|float %}
    {% set fil_area = (fil_dia / 2) ** 2 * 3.14159 %}
    {% set calc_len = (purge_volume / fil_area) if fil_area > 0 else 0 %}
    {% set purge_len = [calc_len, min_purge_mm] | max %}

    {% set taper_e = [purge_len - base_e, 1] | max %}
    {% set seg_e = (taper_e / rise_segs) | round(2) %}
    {% set seg_z = (rise_mm / rise_segs) | round(2) %}

    {% set cur_fan = printer.fan.speed %}
    {% set safe_z = printer.toolhead.position.z %}

    MMU_LOG MSG="Blob purge: {purge_len|round(1)}mm ({base_e}mm base + {taper_e|round(1)}mm taper)"

    # Step 1: Lower to blob_z so hanging ooze from unload deposits on bed as base
    G90
    G1 Z{blob_z} F1200

    # Step 2: Un-retract HH parking retraction
    M83
    {% if retracted_length > 0 %}
        G1 E{retracted_length} F{unretract_speed * 60}
    {% endif %}

    # Step 3: Small anchor extrusion at blob_z - minimal base contact to reduce sticking
    G1 E{base_e} F{purge_speed}

    # Step 4: Extrude most material while rising - tall blob has less bed contact area
    G91
    {% for i in range(rise_segs) %}
    G1 E{seg_e} F{purge_speed}
    G1 Z{seg_z} F120
    {% endfor %}

    # Step 5: Retract to break string, rise to clear
    G1 E-6 F1800
    G1 Z5 F600

    # Step 6: Blast fan to solidify
    M106 S255
    G4 P{cool_ms}

    # Step 7: Move right of blob for knock approach
    G90
    G1 X{knock_x_right} Y290 F6000

    # Step 8: Lower to knock height
    G1 Z{knock_z} F1200

    # Step 9: Sweep left to knock blob off bed
    G1 X{knock_x_left} F3000

    # Step 10: Rise to safe Z
    G1 Z{safe_z} F3000

    # Step 11: Restore filament state for HH
    M83
    G1 E6 F{unretract_speed * 60}
    {% if retracted_length > 0 %}
        G1 E-{retracted_length} F{retract_speed * 60}
    {% endif %}

    # Step 12: Restore fan
    M106 S{(cur_fan * 255) | int}

    MMU_LOG MSG="Blob purge complete - blob knocked off bed"

###########################################################################
# Endless Spool Stub Purge - Comgrow T300
# Called automatically via user_post_form_tip_extension on runout events.
# Ejects the old filament stub (110mm) forward as a blob at the purge
# corner - NO retraction, forward movement only. Identical structure to
# _MMU_BLOB_PURGE but sized for stub length instead of purge volume.
#
# Requires in mmu_macro_vars.cfg:
#   variable_park_runout: 10, 290, 5, 5, 2
#   variable_user_post_form_tip_extension: '_MMU_ENDLESS_SPOOL_STUB_PURGE'
#   variable_use_skinnydip: False
###########################################################################

[gcode_macro _MMU_ENDLESS_SPOOL_STUB_PURGE]
description: Eject old filament stub as blob on endless spool runout - forward only
gcode:
    {% if not printer.mmu.runout and not params.FORCE|default(0)|int %}
        MMU_LOG MSG="Stub purge skipped - not a runout event"
    {% else %}
        # ---- Configuration ----
        {% set blob_z        = 1.5   %}  # Z to start blob (same as _MMU_BLOB_PURGE)
        {% set base_e        = 8     %}  # Small anchor extrusion at blob_z (mm)
        {% set rise_mm       = 15    %}  # Total Z rise during taper
        {% set rise_segs     = 4     %}  # Number of taper segments
        {% set purge_speed   = 150   %}  # Slower than color change - stub may be cold
        {% set stub_length   = params.STUB_LENGTH|default(70)|int %}  # 130=extruder->nozzle (110+20), 80=sensor->nozzle (62+18)
        {% set cool_ms       = 8000  %}  # Fan cooling time ms
        {% set knock_x_right = 35    %}  # X right of blob for knock approach
        {% set knock_x_left  = -2    %}  # X to sweep to (off bed edge)
        {% set knock_z       = 1     %}  # Z height for knock sweep

        {% set sequence_vars = printer['gcode_macro _MMU_SEQUENCE_VARS'] %}
        {% set park_vars     = printer['gcode_macro _MMU_PARK'] %}
        {% set retracted_length = park_vars.retracted_length|default(0)|float %}
        {% set retract_speed    = sequence_vars.retract_speed|default(30)|int %}
        {% set unretract_speed  = sequence_vars.unretract_speed|default(30)|int %}

        {% set taper_e = [stub_length - base_e, 1] | max %}
        {% set seg_e   = (taper_e / rise_segs) | round(2) %}
        {% set seg_z   = (rise_mm / rise_segs) | round(2) %}

        {% set cur_fan = printer.fan.speed %}
        {% set safe_z  = printer.toolhead.position.z %}

        MMU_LOG MSG="Endless spool stub purge: ejecting ~{stub_length}mm of old filament as blob"

        # Step 1: Lower to blob_z - stub ooze deposits here as base
        G90
        G1 Z{blob_z} F1200

        # Step 2: Un-retract parking retraction only (no tip retraction - stub was never retracted)
        M83
        {% if retracted_length > 0 %}
            G1 E{retracted_length} F{unretract_speed * 60}
        {% endif %}

        # Step 3: Small anchor extrusion at blob_z
        G1 E{base_e} F{purge_speed}

        # Step 4: Extrude stub while rising - forward only, stub melts out nozzle
        G91
        {% for i in range(rise_segs) %}
        G1 E{seg_e} F{purge_speed}
        G1 Z{seg_z} F120
        {% endfor %}

        # Step 5: Retract to break string, rise to clear
        G1 E-6 F1800
        G1 Z5 F600

        # Step 6: Blast fan to solidify blob
        M106 S255
        G4 P{cool_ms}

        # Step 7: Move right of blob for knock approach
        G90
        G1 X{knock_x_right} Y290 F6000

        # Step 8: Lower to knock height
        G1 Z{knock_z} F1200

        # Step 9: Sweep left to knock stub blob off bed
        G1 X{knock_x_left} F3000

        # Step 10: Rise to safe Z
        G1 Z{safe_z} F3000

        # Step 11: Restore filament state for HH (next gate loads fresh)
        M83
        G1 E6 F{unretract_speed * 60}
        {% if retracted_length > 0 %}
            G1 E-{retracted_length} F{retract_speed * 60}
        {% endif %}

        # Step 12: Restore fan
        M106 S{(cur_fan * 255) | int}

        MMU_LOG MSG="Stub purge complete - old filament ejected, next gate loading"
    {% endif %}

###########################################################################
# Pre-print TTG reset + gate remap: resets TTG to defaults then remaps
# tools from empty gates to available alternatives in the same endless
# spool group. Two-macro chain required so MMU_REMAP_TTG RESET=1 executes
# before _MMU_REMAP_EMPTY_SPOOL_GATES's Jinja evaluates the ttg_map.
###########################################################################
[gcode_macro _MMU_PRE_PRINT_REMAP]
description: Reset TTG to defaults then remap tools from empty gates (called pre-print)
gcode:
    MMU_LOG MSG="Pre-print: Resetting TTG map to defaults [0,1,2,3] before availability check"
    MMU_REMAP_TTG RESET=1
    _MMU_REMAP_EMPTY_SPOOL_GATES

###########################################################################
# Pre-print gate remap: if a tool's mapped gate is EMPTY but another gate
# in the same endless_spool_group has filament, remap the tool to that gate
# before MMU_START_CHECK runs. This lets a print start without physically
# loading an empty gate when alternatives exist in the same group.
###########################################################################
[gcode_macro _MMU_REMAP_EMPTY_SPOOL_GATES]
description: Pre-print remap of tools from empty gates to available endless spool alternatives
gcode:
    {% set groups = printer.mmu.endless_spool_groups %}
    {% set gate_status = printer.mmu.gate_status %}
    {% set ttg = printer.mmu.ttg_map %}
    {% for t in range(ttg|length) %}
        {% set gate = ttg[t] %}
        {% if gate_status[gate] == 0 %}
            {% set cur_group = groups[gate] %}
            {% set ns = namespace(next_gate=-1) %}
            {% for g in range(groups|length) %}
                {% if g != gate and groups[g] == cur_group and gate_status[g] >= 1 and ns.next_gate == -1 %}
                    {% set ns.next_gate = g %}
                {% endif %}
            {% endfor %}
            {% if ns.next_gate >= 0 %}
                MMU_LOG MSG="Pre-print: T{t} gate {gate} empty, remapping to gate {ns.next_gate}"
                MMU_REMAP_TTG TOOL={t} GATE={ns.next_gate}
            {% else %}
                MMU_LOG MSG="Pre-print: T{t} gate {gate} empty, no alternative available in group {cur_group}"
            {% endif %}
        {% endif %}
    {% endfor %}



###########################################################################
# Endless Spool Dashboard Controls
# All macros here appear as buttons in the Mainsail / Fluidd macro panel.
# Macros starting with _ are hidden from the UI.
###########################################################################

[gcode_macro ENDLESS_SPOOL_TOGGLE]
description: Toggle Endless Spool on/off
gcode:
    {% if printer.mmu is not defined or not printer.mmu.enabled %}
        {action_respond_info("MMU is not enabled")}
    {% elif printer.mmu.endless_spool_enabled %}
        MMU_ENDLESS_SPOOL ENABLE=0
    {% else %}
        MMU_ENDLESS_SPOOL ENABLE=1
    {% endif %}


[gcode_macro ENDLESS_SPOOL_STATUS]
description: Display current Endless Spool groups and enabled state
gcode:
    {% if printer.mmu is not defined or not printer.mmu.enabled %}
        {action_respond_info("MMU is not enabled")}
    {% else %}
        MMU_ENDLESS_SPOOL
    {% endif %}


[gcode_macro ENDLESS_SPOOL_SET_GROUPS]
description: Set gate groups manually. Same number = same group. Params: G0 G1 G2 G3
gcode:
    {% set g0 = params.G0|default(0)|int %}
    {% set g1 = params.G1|default(0)|int %}
    {% set g2 = params.G2|default(1)|int %}
    {% set g3 = params.G3|default(1)|int %}
    {% if not printer.mmu.endless_spool_enabled %}
        MMU_ENDLESS_SPOOL ENABLE=1 QUIET=1
    {% endif %}
    MMU_ENDLESS_SPOOL GROUPS={g0},{g1},{g2},{g3}


[gcode_macro ENDLESS_SPOOL_GROUPS_ALL]
description: Preset: All four gates share one spool (any gate can follow any other)
gcode:
    MMU_ENDLESS_SPOOL ENABLE=1 QUIET=1 GROUPS=0,0,0,0
    {action_respond_info("Endless Spool groups: [Gate0 + Gate1 + Gate2 + Gate3]")}

###########################################################################
# Endless spool state holder - variables set by PAUSE macro before delayed
# gate switch fires. Avoids calling RESUME_BASE inside PAUSE (which clears
# is_paused before Happy Hare error handler finishes).
###########################################################################
[gcode_macro _MMU_ENDLESS_SPOOL_STATE]
variable_next_gate: -1
variable_cur_gate: -1
variable_extruder_runout: 0
gcode:
    # State holder only - no gcode to run directly


[delayed_gcode _mmu_endless_spool_switch]
initial_duration: 0
gcode:
    {% set state = printer['gcode_macro _MMU_ENDLESS_SPOOL_STATE'] %}
    {% if state.next_gate >= 0 and printer.pause_resume.is_paused %}
        MMU_UNLOCK
        {% if state.extruder_runout %}
        _MMU_ENDLESS_SPOOL_STUB_PURGE FORCE=1 STUB_LENGTH=80
        MMU_RECOVER LOADED=0
        {% else %}
        _MMU_ENDLESS_SPOOL_STUB_PURGE FORCE=1
        {% endif %}
        MMU_GATE_MAP GATE={state.cur_gate} AVAILABLE=0
        MMU_SELECT GATE={state.next_gate}
        MMU_LOAD
        MMU_RECOVER LOADED=1
        SET_GCODE_VARIABLE MACRO=_MMU_ENDLESS_SPOOL_STATE VARIABLE=next_gate VALUE=-1
        RESUME
    {% endif %}
